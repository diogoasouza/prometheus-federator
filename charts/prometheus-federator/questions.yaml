questions:
- variable: global.cattle.psp.enabled
  default: "false"
  description: "Flag to enable or disable the installation of PodSecurityPolicies by this chart in the target cluster. If the cluster is running Kubernetes 1.25+, you must update this value to false."
  label: "Enable PodSecurityPolicies"
  type: boolean
  group: "Security Settings"
- variable: helmProjectOperator.helmController.enabled
  label: Enable Embedded Helm Controller
  description: 'Note: If you are running Prometheus Federator in an RKE2 / K3s cluster before v1.23.14 / v1.24.8 / v1.25.4, this should be disabled.'
  type: boolean
  group: Helm Controller
- variable: helmProjectOperator.helmLocker.enabled
  label: Enable Embedded Helm Locker
  type: boolean
  group: Helm Locker
- variable: helmProjectOperator.projectReleaseNamespaces.labelValue
  label: Project Release Namespace Project ID
  description: By default, the System Project is selected. This can be overriden to a different Project (e.g. p-xxxxx)
  type: string
  required: false
  group: Namespaces
- variable: helmProjectOperator.releaseRoleBindings.clusterRoleRefs.admin
  label: Admin ClusterRole
  description: By default, admin selects Project Owners. This can be overridden to a different ClusterRole (e.g. rt-xxxxx)
  type: string
  default: admin
  required: false
  group: RBAC
- variable: helmProjectOperator.releaseRoleBindings.clusterRoleRefs.edit
  label: Edit ClusterRole
  description: By default, edit selects Project Members. This can be overridden to a different ClusterRole (e.g. rt-xxxxx)
  type: string
  default: edit
  required: false
  group: RBAC
- variable: helmProjectOperator.releaseRoleBindings.clusterRoleRefs.view
  label: View ClusterRole
  description: By default, view selects Read-Only users. This can be overridden to a different ClusterRole (e.g. rt-xxxxx)
  type: string
  default: view
  required: false
  group: RBAC

- variable: helmProjectOperator.chartSource.name
  label: Approved Project Monitoring Chart Name
  description: Required with repository URL and version. Prometheus Federator now deploys only an approved external project-monitoring chart.
  type: string
  required: false
  group: Project Monitoring Chart
- variable: helmProjectOperator.chartSource.repo
  label: Approved Project Monitoring Chart Repository
  description: Required. Helm repository URL for the approved external project-monitoring chart.
  type: string
  required: false
  group: Project Monitoring Chart
- variable: helmProjectOperator.chartSource.version
  label: Approved Project Monitoring Chart Version
  description: Required. Version of the approved external project-monitoring chart to deploy.
  type: string
  required: false
  group: Project Monitoring Chart
- variable: helmProjectOperator.valuesOverride.grafana.image.repository
  label: Grafana image
  description: Required. Grafana image to be deployed.
  type: string
  required: true
  group: Grafana Chart
- variable: helmProjectOperator.valuesOverride.grafana.image.tag
  label: Grafana image tag
  description: Required. Grafana image tag to be deployed.
  type: string
  required: true
  group: Grafana Chart
- variable: helmProjectOperator.valuesOverride.grafana.downloadDashboardsImage.repository
  label: Curl image
  description: Required. Curl image to be deployed.
  type: string
  required: true
  group: Grafana Chart
- variable: helmProjectOperator.valuesOverride.grafana.downloadDashboardsImage.tag
  label: Curl image tag
  description: Required. Curl image tag to be deployed.
  type: string
  required: true
  group: Grafana Chart
- variable: helmProjectOperator.valuesOverride.grafana.initChownData.image.repository
  label: Busybox image
  description: Required. Busybox image to be deployed.
  type: string
  required: true
  group: Grafana Chart
- variable: helmProjectOperator.valuesOverride.grafana.initChownData.image.tag
  label: Busybox image tag
  description: Required. Busybox image tag to be deployed.
  type: string
  required: true
  group: Grafana Chart
- variable: helmProjectOperator.valuesOverride.grafana.sidecar.image.repository
  label: Sidecar image
  description: Required. Sidecar image to be deployed.
  type: string
  required: true
  group: Grafana Chart
- variable: helmProjectOperator.valuesOverride.grafana.sidecar.image.tag
  label: Sidecar image tag
  description: Required. Sidecar image tag to be deployed.
  type: string
  required: true
  group: Grafana Chart
- variable: helmProjectOperator.valuesOverride.grafana.imageRenderer.image.repository
  label: Image renderer image
  description: Required. Image renderer image to be deployed.
  type: string
  required: true
  group: Grafana Chart
- variable: helmProjectOperator.valuesOverride.grafana.imageRenderer.image.tag
  label: Image renderer image tag
  description: Required. Image renderer image tag to be deployed.
  type: string
  required: true
  group: Grafana Chart
